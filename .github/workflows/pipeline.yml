name: CI CD Pipeline
on:
  push:
    branches: [ main, dev, ft/pipeline ]
  pull_request:
    branches: [ main, ft/pipeline ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'
          cache: 'maven'

      - name: Install dependencies
        run: mvn install -DskipTests

      - name: Install Playwright Browsers
        # This installs Chromium on the Ubuntu server so the test doesn't crash
        run: mvn exec:java -e -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install --with-deps"

      - name: Run Automated Tests
        run: mvn test
