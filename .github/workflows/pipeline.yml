name: CI CD Pipeline

on:
  push:
    branches: [ main, dev, ft/pipeline ]
  pull_request:
    branches: [ main, ft/pipeline ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Java
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'
          cache: maven

      # 3️⃣ Install dependencies (without running tests)
      - name: Install dependencies
        run: mvn clean install -DskipTests

      # 4️⃣ Install Playwright browsers (required for CI)
      - name: Install Playwright Browsers
        run: mvn exec:java -e -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install --with-deps"

      # 5️⃣ Run tests
      - name: Run Automated Tests
        run: mvn test